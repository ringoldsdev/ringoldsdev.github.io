---
layout: default
prism: true
---

{% include "./partials/header-post.html" %}

<div class="container max-w-4xl mt-6 px-6">
  <h1 class="font-bold text-5xl tracking-tighter mb-3 text-center lg:text-8xl">
    {{ title | headline | safe }}
  </h1>
  <p class="mt-8 text-center text-base leading-6 font-medium text-gray-500">
    <time> {{ date | readableDate }} </time>
  </p>
  <article class="mt-16 prose lg:prose-xl my-4 mx-auto">
    {{ content | safe }}
  </article>
</div>
